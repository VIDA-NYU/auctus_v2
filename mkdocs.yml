site_name: Auctus v2
site_description: Urban Data Catalog - FastAPI & React

site_url: https://nyu-urban.github.io/auctus_v2/  # Update this to match your NYU repo path

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.tabs
    - code.copy

