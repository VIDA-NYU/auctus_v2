site_name: Auctus v2
site_description: Urban Data Catalog - FastAPI & React

site_url: https://vida-nyu.github.io/auctus_v2/

repo_name: VIDA-NYU/auctus_v2
repo_url: https://github.com/VIDA-NYU/auctus_v2

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.tabs
    - code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Installation & Setup: installation.md
  - API Reference:
      - Search: api/search.md
      - Portals: api/portals.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            members_order: source
            show_root_heading: true
            docstring_style: google
