# Full production-local stack — "Full Production Local Test".
#
#   docker compose up -d
#
# Brings up EVERYTHING containerized: the infrastructure tier (OpenSearch,
# Dashboards, MinIO, Redis), the ARQ ingestion worker, the FastAPI backend built
# from backend/Dockerfile, and the nginx-served frontend built from
# frontend/Dockerfile. Use this to validate the real production images locally.
#
# For active backend development on your host (no manual `docker stop` needed),
# use docker-compose-local-backend.yml instead.

services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch
    environment:
      - cluster.name=auctus-opensearch-cluster
      - node.name=auctus-node-1
      - discovery.type=single-node
      - network.host=0.0.0.0
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    restart: unless-stopped

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - 5601:5601
    depends_on:
      - opensearch
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: auctus-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio-data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: auctus-redis
    ports:
      - 6379:6379
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: auctus-backend:local
    container_name: auctus-backend
    environment:
      - PYTHONUNBUFFERED=1
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - MINIO_ENDPOINT=auctus-minio:9000
      # Rank search results on the AutoDDG search-focused description by default.
      # Compose deployments ingest with the worker, so the field is always
      # populated; the in-code fallback stays "original" to protect existing
      # indices that have not been re-ingested.
      - DEFAULT_DESCRIPTION_SOURCE=sfd
    ports:
      - 8000:8000
    depends_on:
      - opensearch
      - minio
      - redis
    restart: unless-stopped

  arq-worker:
    # Reuses the backend image (same code + dependencies). AutoDDG is installed
    # at container start from PyPI rather than baked in: it is only needed by the
    # worker, and its numpy>=2.2.2 requirement conflicts with the Intel-macOS
    # numpy<2 pin the shared requirements.txt carries (that pin is a no-op inside
    # this Linux image, so the install succeeds here). Runs as root so the runtime
    # pip install can write to site-packages; the install is best-effort and the
    # worker still starts (descriptions skipped) if it fails.
    build:
      context: ./backend
    image: auctus-arq-worker:local
    container_name: auctus-arq-worker
    user: root
    command: >
      sh -c "(pip install --no-cache-dir autoddg==0.1.2 || echo 'WARN: autoddg install failed; descriptions will be skipped') &&
             arq storage.arq_worker.WorkerSettings"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - MINIO_ENDPOINT=auctus-minio:9000
    depends_on:
      - opensearch
      - minio
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the bundle at build time so the fully-containerized stack
        # calls the backend published on the host at :8000.
        VITE_API_URL: http://localhost:8000
    image: auctus-frontend:local
    container_name: auctus-frontend
    # Published on 5173 so the browser origin matches the backend CORS allow-list
    # (http://localhost:5173). The bundled app calls the API at localhost:8000.
    ports:
      - 5173:80
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  opensearch-data:
    driver: local
  minio-data:
    driver: local
