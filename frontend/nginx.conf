server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Lightweight liveness/readiness endpoint for Kubernetes probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # SPA history fallback: unknown paths are served index.html so that
    # client-side routes (react-router) resolve instead of 404-ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints asset filenames, so they can be cached aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached, or clients pin a stale bundle after deploys.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;
}
