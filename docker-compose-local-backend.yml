# Local backend development — "Local Backend Development".
#
#   docker compose -f docker-compose-local-backend.yml up -d
#
# Brings up the infrastructure tier (OpenSearch, Dashboards, MinIO, Redis), the
# ARQ ingestion worker, and the containerized frontend — but deliberately does
# NOT start the FastAPI backend. This lets you run the API on your host inside a
# virtualenv (with hot-reload) WITHOUT having to `docker stop auctus-backend`.
#
# Typical workflow:
#   docker compose -f docker-compose-local-backend.yml up -d      # infra + worker + frontend
#   cd backend && source .venv/bin/activate && python3 main.py    # backend on host :8000
#
# The frontend (http://localhost:5173) and browser call the host backend at
# http://localhost:8000; that origin is in the backend CORS allow-list.
#
# Note: this file intentionally duplicates the infra/worker/frontend service
# definitions from docker-compose.yml (minus the backend). Keep the two in sync
# when changing shared infrastructure settings.

services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch
    environment:
      - cluster.name=auctus-opensearch-cluster
      - node.name=auctus-node-1
      - discovery.type=single-node
      - network.host=0.0.0.0
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    restart: unless-stopped

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - 5601:5601
    depends_on:
      - opensearch
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: auctus-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio-data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: auctus-redis
    ports:
      - 6379:6379
    restart: unless-stopped

  arq-worker:
    # Reuses the backend image (built from backend/Dockerfile). AutoDDG is
    # installed at container start from PyPI; see docker-compose.yml for the full
    # rationale. Runs as root so the runtime pip install can write to
    # site-packages; the install is best-effort and the worker still starts
    # (descriptions skipped) if it fails.
    build:
      context: ./backend
    image: auctus-arq-worker:local
    container_name: auctus-arq-worker
    user: root
    command: >
      sh -c "(pip install --no-cache-dir autoddg==0.1.2 || echo 'WARN: autoddg install failed; descriptions will be skipped') &&
             arq storage.arq_worker.WorkerSettings"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - MINIO_ENDPOINT=auctus-minio:9000
    depends_on:
      - opensearch
      - minio
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: auctus-frontend:local
    container_name: auctus-frontend
    # Published on 5173 so the browser origin matches the backend CORS allow-list.
    # The bundled app calls the API at localhost:8000 — here that is your
    # host-run backend, not a container.
    ports:
      - 5173:80
    # No depends_on: the backend runs on the host, not as a Compose service.
    restart: unless-stopped

volumes:
  opensearch-data:
    driver: local
  minio-data:
    driver: local
